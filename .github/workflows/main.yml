name: FTP Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Build project
        run: |
          npm ci
          npm run build

      - name: Inspect build output
        run: |
          pwd
          ls -la
          ls -la dist
          find dist -maxdepth 2 -type f

      - name: Deploy over FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: hosting236035.ae855.netcup.net
          username: ${{ secrets.FTP_NETCUP_USERNAME }}
          password: ${{ secrets.FTP_NETCUP_PASSWORD }}
          server-dir: /friedrich-fischer.de/
          local-dir: ./dist/
          state-name: .ftp-deploy-sync-state-dist.json
